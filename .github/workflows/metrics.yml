name: Lowlighter Metrics
on:
  # Schedule updates (once a day at midnight)
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual updates from the "Actions" tab
  workflow_dispatch:
  # Push updates whenever you change this file
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_KEY }}
          filename: github-metrics.svg
          base: ""
          
          plugin_repositories: yes
          plugin_repositories_featured: lifengyin/trivmaster-parser, lifengyin/personal-website

          plugin_languages: yes
          plugin_languages_sections: most-used   # <--- CHANGED THIS
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
