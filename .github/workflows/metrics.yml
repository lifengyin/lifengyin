name: Lowlighter Metrics
on:
  # Schedule updates (once a day at midnight)
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual updates from the "Actions" tab
  workflow_dispatch:
  # Push updates whenever you change this file
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_KEY }}
          filename: github-metrics.svg
          base: header, sections, repositories
          
          plugin_repositories: yes
          featured_repositories: lifengyin/trivmaster-parser
